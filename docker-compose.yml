# Required: Copy .env.example to .env and set your own values before running:
#   cp .env.example .env
#
# WARNING: The .env.example file contains weak default passwords.
# NEVER use those defaults in production. Generate strong secrets for your .env file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: coopdata-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopdata"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: coopdata-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MailHog — local SMTP server for development (invitation emails, password resets)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: coopdata-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    container_name: coopdata-keycloak
    command: start-dev --import-realm
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: ${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8180"
    ports:
      - "8180:8180"
      - "9000:9000"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8180'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # Configure SMTP for Keycloak after realm import (realm import doesn't overwrite existing settings)
  keycloak-config:
    image: alpine/curl:latest
    container_name: coopdata-keycloak-config
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache jq

        echo "Waiting for Keycloak to be ready..."
        until curl -sf "http://keycloak:8180/realms/master" > /dev/null 2>&1; do
          sleep 3
        done
        echo "Keycloak is ready! Configuring SMTP..."

        # Get admin token
        TOKEN=$$(curl -s -X POST "http://keycloak:8180/realms/master/protocol/openid-connect/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "username=$${KEYCLOAK_ADMIN}" \
          -d "password=$${KEYCLOAK_ADMIN_PASSWORD}" \
          -d "grant_type=password" \
          -d "client_id=admin-cli" | jq -r '.access_token')

        if [ -z "$$TOKEN" ] || [ "$$TOKEN" = "null" ]; then
          echo "Failed to get admin token"
          exit 1
        fi

        echo "Got admin token, fetching realm config..."

        # Get current realm config
        CURRENT=$$(curl -s "http://keycloak:8180/admin/realms/$${KEYCLOAK_REALM}" \
          -H "Authorization: Bearer $$TOKEN")

        # Update SMTP settings and frontendUrl using jq for proper JSON manipulation.
        # frontendUrl tells Keycloak what public hostname to use in generated links
        # (email verification, org invitation). Without it, Keycloak uses its internal
        # Docker hostname (keycloak:8180) which browsers cannot resolve.
        UPDATED=$$(echo "$$CURRENT" | jq \
          --arg frontend_url "$${KEYCLOAK_FRONTEND_URL}" \
          '.smtpServer = {
            "starttls": "false",
            "auth": "false",
            "port": "1025",
            "host": "mailhog",
            "from": "coopdata@localhost",
            "fromDisplayName": "CoopData",
            "envelopeFrom": "",
            "ssl": "false"
          } | .attributes.frontendUrl = [$frontend_url]')

        # Apply updated config
        RESPONSE=$$(curl -s -o /dev/null -w "%{http_code}" -X PUT "http://keycloak:8180/admin/realms/$${KEYCLOAK_REALM}" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "$$UPDATED")

        if [ "$$RESPONSE" = "204" ] || [ "$$RESPONSE" = "200" ]; then
          echo "SMTP configuration applied successfully!"
          echo "  Host: mailhog:1025"
          echo "  From: coopdata@localhost"
        else
          echo "Failed to apply SMTP config (HTTP $$RESPONSE)"
          echo "Response body:"
          curl -s -X PUT "http://keycloak:8180/admin/realms/$${KEYCLOAK_REALM}" \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "$$UPDATED"
          exit 1
        fi
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_FRONTEND_URL: ${KEYCLOAK_FRONTEND_URL}
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coopdata-backend
    env_file:
      - .env
    environment:
      HOST: ${HOST}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      FRONTEND_URL: ${FRONTEND_URL}
      ENVIRONMENT: ${ENVIRONMENT}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    container_name: coopdata-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: