name: Docker Build, Scan & Publish

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  release:
    types: [published]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Generate image names (lowercase)
        id: images
        run: |
          echo "frontend=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}-frontend" >> $GITHUB_OUTPUT
          echo "backend=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}-backend" >> $GITHUB_OUTPUT
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.frontend }}
          tags: |
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release' }}
            type=raw,value=develop,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
            type=sha,prefix=,enable=${{ github.event_name == 'push' || github.event_name == 'release' }}
            type=ref,event=tag
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}
          labels: |
            org.opencontainers.image.title=CoopData Frontend

      - id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.backend }}
          tags: |
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release' }}
            type=raw,value=develop,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
            type=sha,prefix=,enable=${{ github.event_name == 'push' || github.event_name == 'release' }}
            type=ref,event=tag
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}
          labels: |
            org.opencontainers.image.title=CoopData Backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.images.outputs.frontend }}
          format: sarif
          output: trivy-frontend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.images.outputs.backend }}
          format: sarif
          output: trivy-backend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: |
            trivy-frontend-results.sarif
            trivy-backend-results.sarif
          category: trivy-results
        continue-on-error: true

      - name: Check for vulnerabilities
        if: always()
        run: |
          set -euo pipefail
          found=false
          for f in trivy-frontend-results.sarif trivy-backend-results.sarif; do
            if [ -f "$f" ] && jq -e '.runs[]?.results? | length > 0' "$f" >/dev/null 2>&1; then
              echo "::error::Vulnerabilities found in $(basename "$f" .sarif)"
              jq -r '.runs[]?.results[]?.ruleId // empty' "$f" 2>/dev/null | sort -u
              found=true
            fi
          done
          if [ "$found" = true ]; then
            exit 1
          fi

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: build-scan
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image names (lowercase)
        id: images
        run: |
          echo "frontend=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}-frontend" >> $GITHUB_OUTPUT
          echo "backend=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}-backend" >> $GITHUB_OUTPUT
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.frontend }}
          tags: |
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release' }}
            type=raw,value=develop,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
            type=sha,prefix=,enable=${{ github.event_name == 'push' || github.event_name == 'release' }}
            type=ref,event=tag

      - id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.backend }}
          tags: |
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release' }}
            type=raw,value=develop,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
            type=sha,prefix=,enable=${{ github.event_name == 'push' || github.event_name == 'release' }}
            type=ref,event=tag

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max