name: Backend CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  backend_setup:
    name: Backend Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-backend-
          cache-on-failure: true

  backend_lint:
    name: Backend Lint
    needs: [backend_setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Format check
        working-directory: ./backend
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: ./backend
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  backend_build:
    name: Backend Build
    needs: [backend_setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Build
        working-directory: ./backend
        run: cargo build --workspace --all-targets --all-features

  backend_test:
    name: Backend Test
    needs: [backend_setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Run tests
        working-directory: ./backend
        run: cargo test --workspace --all-targets --all-features

  backend_docs:
    name: Backend Docs
    needs: [backend_setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Generate docs
        working-directory: ./backend
        run: cargo doc --workspace --all-features --no-deps